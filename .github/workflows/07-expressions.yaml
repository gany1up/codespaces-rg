name: 07 - Using Expressions
on: 
  push:
  workflow_dispatch:
    debug:
      type: boolean
      default: false
jobs:
  echo:
    runs-on:  ubuntu-latest
    steps:
      - name: [debug] Print start-up data
        if: inputs.debug == ture
        run: |
           echo "Triggered by: ${{github.trigger}}"
           echo "Branch: ${{github.ref_name}}"
           echo "Commit SHA: ${{github.sha}}"
           echo "Runner OS: ${{github.os}}"

      - name: [debug] Print when triggered from main
        if: inputs.debug == ture || github.branch == 'main'
        run:
          echo "I was triggered from main"

      - name: tpring 
        run:
          echo "Hello, world"    
          